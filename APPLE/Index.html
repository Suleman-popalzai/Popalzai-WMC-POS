<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Calculator Popalzai</title>
    <link rel="stylesheet" href="syle.css">
</head>
<body>
    <h1 style="text-align: center; color: #2ad043; font-size: 2rem;">Popalzai</h1>
    <main class="calculator">
        <input id="display" class="display" type="text" value="0" disabled>
        <div class="buttons">
            <button onclick="setOperator('0')">0</button>
            <button onclick="setOperator('-')">NAN</button>
            <button onclick="setOperator('*')">*</button>
            <button onclick="setOperator('/')">/</button>
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('×')">×</button>
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('-')">-</button>
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>
            <button class="zero" onclick="appendToDisplay('0')">0</button>
            <button onclick="appendToDisplay('.')">,</button>
            <button class="operator" onclick="calculate()">=</button>
        </div>
    </main>
    <script src="index.js"></script>
</body>
</html>
