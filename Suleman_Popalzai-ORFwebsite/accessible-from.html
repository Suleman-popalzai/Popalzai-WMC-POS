

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Form</title>
</head>
<body>

    <!-- The main heading of the page.It should describe the page's purpose clearly.H1 is important for accessibility and SEO -->
    <h1>Register for Our Service</h1>
    <p style="background-color: rgba(17, 119, 221, 0.627); padding: 10px;"></p>
    <!-- Begin the form. We're using the POST method to securely send form data:The action attribute would define where the form data is sent on submission, here it's "/submit" -->
    <form action="/submit" method="POST" novalidate aria-describedby="formDesc">

        <!-- Screen reader user will hear this description befor interacting with the from.It explains the purpose of the from and provides any necessary instructions -->
        <p id="formDesc">Please fill Without all required fields marked with an asterisk (*).</p>

        <!-- Text input for Name -->
        <div>
            <label for="name">Name: </label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required aria-invalid="false">
        </div>

        <!-- Email lnput -->
        <div>
            <label for="email">Email: </label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required aria-describedby="emailHelp">
            <span id="emailHelp">We’ll never share your email with anyone else.</span>
        </div>

        <!-- Password lnput -->
        <div>
            <label for="password">Password: </label>
            <input type="password" id="password" name="password" placeholder="Enter a password" required minlength="8" aria-invalid="false" aria-describedby="passwordHelp">
            <span id="passwordHelp">Password must be at least 8 characters long.</span>
        </div>

        <!-- Birthday Field -->
        <div>
            <label for="birthday">Birthday: </label>
            <input type="date" id="birthday" name="birthday" required aria-invalid="false">
        </div>

        <!-- Dropdown to select interessts -->
        <div>
            <label for="interests">Select your interests: </label>
            <select id="interests" name="interests" required aria-invalid="false">
                <option value="" disabled selected>Select an interest</option>
                <option value="sports">Sports</option>
                <option value="music">Music</option>
                <option value="art">Art</option>
                <option value="tech">Technology</option>
            </select>
        </div>

        <!-- Radio-Buttons for Gender -->
        <fieldset>
            <legend>Gender: </legend>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
            </div>
            <div>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>
            <div>
                <input type="radio" id="other" name="gender" value="other" required>
                <label for="other">Other</label>
            </div>
        </fieldset>

        <!-- Submit Button with lcon -->
        <div>
            <button type="submit" aria-label="Submit the registration form">
                <img src="submit-icon.png" alt="" aria-hidden="true"> Submit
            </button>
        </div>

    </form>

</body>
</html>
